<!DOCTYPE html>
<html>
	<script>
		let catgiffolder = "https://github.com/world2screen/bigcat-monster/blob/main/bigcatgifs/"
		let catindex = 1;
		let cats2load = 106
		
		
		function thing() {
			console.log(catindex)
			
			for (let i=catindex; i <= cats2load && i < 50+catindex; i++) {
				console.log(i)
				
				let ele = document.getElementById("cats")
				
				let img = document.createElement('img')
				img.className ="grid";
				img.src = catgiffolder + "cat%20(" + i + ").gif?raw=true"
				
				ele.appendChild(img)
			}
			if (catindex+50 <= cats2load) { catindex = catindex + 50 } else { catindex = cats2load+1 }
		}
	</script>
	<style>
		.grid{
			border:1px solid #ddd;
			float:left;
			width:175px;
			height:175px;
		}
	</style>
	<body>
		<h1>admin@bigcat.monster</h1>
		dc: blablablablalhaha
		
		<button onclick=thing()>load 50 or so cats (you can click it multiple times)</button>
		
		<div id="cats"></div><br>
	</body>
</html>
