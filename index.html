    <script>
        function anim() {
            const elm = document.getElementById('wow');
            var newone = elm.cloneNode(true);
            elm.parentNode.replaceChild(newone, elm);
            document.getElementById('wow').style.animation = "spin1 ease-out 0.3s"
        }
        function play(audio, loop, volume) {
            var audiov = new Audio(audio);
            audiov.loop = loop
            audiov.volume = volume <!-- max is 1 -->
            audiov.play();
        }
        function copy(text) {
            navigator.clipboard.writeText(text);
        }
    </script>
    <style>
        @keyframes spin1 { 33% { transform:rotate(2deg) } 66% { transform:rotate(-2deg) } 99% { transform:rotate(0deg) } }
